<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Portfolio</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Navbar -->
  <nav id="navbar">
    <ul>
      <li><a href="#welcome-section">Home</a></li>
      <li><a href="#projects">Projects</a></li>
      <li><a href="#contact">Contact</a></li>
      <li><a id="profile-link" href="https://github.com/asdf-5844" target="_blank">GitHub</a></li>
    </ul>
  </nav>

  <!-- Welcome Section -->
  <section id="welcome-section">
    <h1>Welcome to My Portfolio</h1>
    <p>Random | Guy | on | Earth</p>
    <p>By the way my name is Ben</p>
  </section>

  <!-- Projects Section -->
  <section id="projects">
    <h2>My Projects</h2>
    <div class="project-tile">
      <a href="https://asdf-5844.github.io/deflyio.github.io/" target="_blank">
        <img src="https://cdn.now.gg/apps-content/com.nowgg.h5.pub513.app51528/game-tiles/defly-io.jpg" alt="Project Thumbnail">
        <p>Defly.io Website!</p>
      </a>
    </div>
  </section>

  <!-- Contact Section -->
  <section id="contact">
    <h2>Contact Me</h2>
    <p>Email: abcdefg@gmail.com</p>
  </section>

  <!-- JavaScript for navbar effects -->
  <script>
    const navbar = document.getElementById("navbar");
    let lastScrollY = window.scrollY;

    window.addEventListener("scroll", () => {
      const currentScrollY = window.scrollY;

      // Color and shadow effects
      if (currentScrollY > 50) {
        navbar.style.background = "linear-gradient(90deg, #0f2027, #203a43, #2c5364)";
        navbar.style.boxShadow = "0 4px 12px rgba(0, 0, 0, 0.3)";
      } else {
        navbar.style.background = "#333";
        navbar.style.boxShadow = "none";
      }

      // Scroll direction awareness (optional effect)
      if (currentScrollY > lastScrollY) {
        navbar.style.opacity = "0.85"; // scrolling down
      } else {
        navbar.style.opacity = "1"; // scrolling up
      }

      lastScrollY = currentScrollY;
    });
  </script>

</body>
</html>
